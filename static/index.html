<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikSave — Téléchargeur TikTok</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080a0f;
      --surface: #0f1117;
      --border: #1e2330;
      --neon: #00f5d4;
      --neon2: #ff3cac;
      --neon3: #ffea00;
      --text: #e8eaf2;
      --muted: #5a6070;
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: rgba(0, 245, 212, 0.07);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: rgba(255, 60, 172, 0.06);
      bottom: -100px; right: -80px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0, 245, 212, 0.08);
      border: 1px solid rgba(0, 245, 212, 0.2);
      border-radius: 100px;
      padding: 0.4rem 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--neon);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }
    .logo-badge::before {
      content: '▶';
      font-size: 0.6rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 3.8rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, var(--neon) 50%, var(--neon2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 400;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0,245,212,0.3), transparent 40%, rgba(255,60,172,0.2));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Quality toggle */
    .quality-toggle {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.25rem;
      gap: 4px;
    }
    .quality-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
    }
    .quality-btn.active {
      background: var(--neon);
      color: #000;
    }
    .quality-btn:not(.active):hover { color: var(--text); }

    /* URL input */
    .input-wrap {
      position: relative;
      margin-bottom: 1.25rem;
    }
    .url-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
    }
    input[type="url"], input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.1);
    }
    input::placeholder { color: var(--muted); }

    /* Download button */
    .btn-download {
      width: 100%;
      padding: 1rem;
      background: var(--neon);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-download:hover:not(:disabled) {
      background: #00dfc0;
      box-shadow: 0 0 30px rgba(0, 245, 212, 0.4);
      transform: translateY(-1px);
    }
    .btn-download:active { transform: translateY(0); }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Status area */
    .status-area {
      margin-top: 1.5rem;
      display: none;
    }
    .status-area.visible { display: block; }

    /* Progress */
    .progress-wrap {
      background: var(--bg);
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .progress-bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--neon), var(--neon2));
      width: 0%;
      transition: width 0.3s ease;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
      100% { filter: brightness(1); }
    }

    .status-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 1rem;
    }

    /* Result card */
    .result-card {
      background: rgba(0, 245, 212, 0.05);
      border: 1px solid rgba(0, 245, 212, 0.2);
      border-radius: 14px;
      padding: 1.25rem;
      display: none;
      animation: fadeUp 0.4s ease;
    }
    .result-card.visible { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem;
      background: transparent;
      border: 1px solid var(--neon);
      border-radius: 10px;
      color: var(--neon);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-save:hover {
      background: var(--neon);
      color: #000;
    }

    /* Error */
    .error-box {
      background: rgba(255, 60, 172, 0.08);
      border: 1px solid rgba(255, 60, 172, 0.3);
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.85rem;
      color: #ff7abf;
      display: none;
      font-family: 'Space Mono', monospace;
    }
    .error-box.visible { display: block; }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 2.5rem;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.6;
    }
    footer span { color: var(--neon2); }

    /* Spinner animation in btn */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.7s linear infinite; }

    /* Dots loader */
    .dots span { animation: blink 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-badge">TIKSAVE v1.0</div>
      <h1>TikSave</h1>
      <p class="subtitle">Télécharge tes vidéos TikTok sans watermark</p>
    </header>

    <div class="card">
      <!-- Qualité -->
      <div class="quality-toggle">
        <button class="quality-btn active" data-q="video" onclick="setQuality(this)">🎬 Vidéo MP4</button>
        <button class="quality-btn" data-q="audio" onclick="setQuality(this)">🎵 Audio MP3</button>
      </div>

      <!-- Input URL -->
      <div class="input-wrap">
        <span class="url-icon">🔗</span>
        <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@user/video/..." />
      </div>

      <!-- Bouton -->
      <button class="btn-download" id="dlBtn" onclick="startDownload()">
        Télécharger
      </button>

      <!-- Zone de statut -->
      <div class="status-area" id="statusArea">
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status-text" id="statusText">
          Préparation<span class="dots"><span>.</span><span>.</span><span>.</span></span>
        </div>

        <div class="result-card" id="resultCard">
          <div class="result-title" id="resultTitle"></div>
          <a class="btn-save" id="downloadLink" href="#" download>
            ⬇ Enregistrer le fichier
          </a>
        </div>

        <div class="error-box" id="errorBox"></div>
      </div>
    </div>

    <footer>
      Utilise <span>yt-dlp</span> en backend · Usage personnel uniquement<br/>
      Respecte les <span>conditions d'utilisation</span> de TikTok
    </footer>
  </div>

  <script>
    let selectedQuality = "video";
    let pollingInterval = null;

    function setQuality(btn) {
      document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedQuality = btn.dataset.q;
    }

    function setProgress(pct) {
      document.getElementById('progressBar').style.width = pct + '%';
    }

    function showStatus(msg) {
      document.getElementById('statusText').innerHTML = msg;
    }

    function reset() {
      clearInterval(pollingInterval);
      document.getElementById('resultCard').classList.remove('visible');
      document.getElementById('errorBox').classList.remove('visible');
      document.getElementById('progressBar').style.width = '0%';
    }

    async function startDownload() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) {
        alert('Colle d\'abord l\'URL TikTok !');
        return;
      }

      reset();

      const btn = document.getElementById('dlBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spin">⟳</span> Traitement...';

      document.getElementById('statusArea').classList.add('visible');
      showStatus('Envoi de la requête<span class="dots"><span>.</span><span>.</span><span>.</span></span>');
      setProgress(15);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, quality: selectedQuality }),
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        const taskId = data.task_id;
        setProgress(30);
        showStatus('Téléchargement en cours<span class="dots"><span>.</span><span>.</span><span>.</span></span>');

        // Polling
        let ticks = 0;
        pollingInterval = setInterval(async () => {
          ticks++;
          const p = Math.min(30 + ticks * 5, 90);
          setProgress(p);

          const sr = await fetch(`/api/status/${taskId}`);
          const sd = await sr.json();

          if (sd.status === 'done') {
            clearInterval(pollingInterval);
            setProgress(100);
            showStatus('✅ Prêt !');

            document.getElementById('resultTitle').textContent = sd.title || 'Vidéo TikTok';
            document.getElementById('downloadLink').href = `/api/file/${taskId}`;
            document.getElementById('resultCard').classList.add('visible');

            btn.disabled = false;
            btn.innerHTML = 'Télécharger une autre';
          } else if (sd.status === 'error') {
            clearInterval(pollingInterval);
            const errBox = document.getElementById('errorBox');
            errBox.textContent = '❌ Erreur : ' + (sd.error || 'Échec du téléchargement');
            errBox.classList.add('visible');
            setProgress(0);
            showStatus('');
            btn.disabled = false;
            btn.innerHTML = 'Réessayer';
          }

          if (ticks > 60) { // timeout 60s
            clearInterval(pollingInterval);
            const errBox = document.getElementById('errorBox');
            errBox.textContent = '⏱ Timeout — le serveur a mis trop de temps.';
            errBox.classList.add('visible');
            btn.disabled = false;
            btn.innerHTML = 'Réessayer';
          }
        }, 1000);

      } catch (err) {
        const errBox = document.getElementById('errorBox');
        errBox.textContent = '❌ ' + err.message;
        errBox.classList.add('visible');
        setProgress(0);
        showStatus('');
        btn.disabled = false;
        btn.innerHTML = 'Réessayer';
      }
    }

    // Permettre Enter
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') startDownload();
    });
  </script>
</body>
</html>
